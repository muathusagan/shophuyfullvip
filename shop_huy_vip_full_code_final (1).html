<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOP HUY VIP FINAL</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{background:linear-gradient(45deg,#ff0000,#000);padding:15px;text-align:center;font-size:26px}
.container{display:flex;flex-wrap:wrap;justify-content:center;padding:10px}
.product{background:#1c1c1c;margin:10px;padding:15px;width:230px;border-radius:12px;box-shadow:0 0 10px red}
button{border:none;padding:10px;margin-top:5px;border-radius:8px;width:100%;cursor:pointer}
.btn-buy{background:red;color:white}
.btn-login{background:#00bfff;color:white}
#cart{position:fixed;right:10px;top:10px;background:black;padding:10px;border-radius:10px;width:250px}
#loginBox{position:fixed;left:10px;bottom:10px;background:black;padding:10px;border-radius:10px;width:200px}
input{width:90%;padding:8px;margin:5px;border-radius:8px;border:none}
</style>
</head>

<body>
<header>🔥 SHOP HUY VIP 🔥</header>

<!-- ADMIN INFO -->
<div style="text-align:center;padding:10px;background:#111;">
<h3>👑 Thông tin Admin</h3>
<p>Admin: Gia Huy</p>
<p>Discord: xetangcuaem</p>
<p>Facebook: Gia Huy</p>
<p>Zalo: 0947114761</p>
</div>

<!-- LOGIN -->
<div id="loginBox" style="position:fixed; left:15px; bottom:15px; background:#111; padding:20px; border-radius:12px; width:220px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.7);">
    <h4 style="margin-top:0; text-align:center; color:#00bfff;">👤 ĐĂNG NHẬP</h4>
    <input id="username" type="text" placeholder="Tài khoản (member)" style="width:90%; padding:10px; margin-bottom:10px; background:#222; color:white; border:1px solid #444;">
    <input id="password" type="password" placeholder="Mật khẩu (36)" style="width:90%; padding:10px; margin-bottom:15px; background:#222; color:white; border:1px solid #444;">
    <button class="btn-login" onclick="login()" style="font-weight:bold; letter-spacing:1px;">ĐĂNG NHẬP</button>
    <p id="status" style="text-align:center; margin-bottom:0; font-size:14px; margin-top:10px;"></p>
</div>

<!-- ADMIN BUTTON -->
<button onclick="adminLogin()" style="position:fixed;top:70px;right:10px;background:gold;color:black;padding:8px;border-radius:8px;">👑 Admin</button>

<!-- PRODUCTS -->
 <div style="background:#1c1c1c; margin: 20px auto; padding:20px; width: 90%; max-width: 400px; border-radius:12px; box-shadow:0 0 10px #00bfff; text-align:center;">
    <h3 style="margin-top:0; color:#00bfff;">📩 Gửi Yêu Cầu Hỗ Trợ</h3>
    <input type="text" placeholder="Tên của bạn" style="width:90%; padding:10px; margin-bottom:10px; background:#222; color:white; border:1px solid #444;">
    <input type="text" placeholder="Vấn đề bạn gặp phải (Lỗi tool, nạp tiền...)" style="width:90%; padding:10px; margin-bottom:15px; background:#222; color:white; border:1px solid #444;">
    <button class="btn-login" onclick="alert('Đã gửi yêu cầu cho Admin Gia Huy!')" style="width:95%; font-weight:bold;">Gửi Cho Admin</button>
</div>
<div class="container" id="products"></div>

<!-- CART -->
<div id="cart">
<h3>Giỏ hàng</h3>
<div id="cartItems"></div>
<hr>
Tổng: <span id="total">0</span>đ
<button class="btn-buy" onclick="checkout()">Thanh toán</button>
</div>

<script>
let isLogin=false;
let cart=[];
let orders=[];
let stk="000139577226332";

let products=[
{name:"Tối ưu PC V1",price:30000,desc:"Tối ưu nhẹ, tăng FPS"},
{name:"Tối ưu PC V2",price:150000,desc:"Tối ưu sâu, mạnh"},
{name:"Silent 1 Day",price:30000,desc:"Tool 1 ngày"},
{name:"Silent 3 Day",price:90000,desc:"Tool 3 ngày"},
{name:"Silent 7 Day",price:150000,desc:"Tool 7 ngày"},
{name:"Silent 30 Day",price:350000,desc:"Tool 30 ngày"},
{name:"Brutal 1 Day",price:35000,desc:"Tool mạnh"},
{name:"Brutal 3 Day",price:90000,desc:"Tool mạnh"},
{name:"Brutal 7 Day",price:170000,desc:"Tool mạnh"},
{name:"Brutal 30 Day",price:450000,desc:"Tool mạnh"},
{name:"Tool cày nhiệm vụ",price:50000,desc:"Auto nhiệm vụ"}
];

function login(){
 let u=document.getElementById("username").value.trim();
 let p=document.getElementById("password").value.trim();

 if(u==="member" && p==="36"){
  isLogin=true;
  document.getElementById("status").innerText="✅ OK";
  document.getElementById("loginBox").style.display="none";
 }else{
  document.getElementById("status").innerText="❌ Sai";
 }
}

function render(){
 let html="";
 products.forEach((p,i)=>{
 html+=`<div class='product'>
 <h3>${p.name}</h3>
 <p>${p.desc}</p>
 <b>${p.price}đ</b>
 <button class='btn-buy' onclick='add(${i})'>Mua</button>
 </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

function add(i){
 if(!isLogin){alert("Login trước!");return}
 cart.push(products[i]);
 renderCart();
}

function renderCart(){
 let html="";
 let total=0;
 cart.forEach((c,i)=>{
 total+=c.price;
 html+=`${c.name} <button onclick='removeItem(${i})'>X</button><br>`;
 });
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText=total;
}

function removeItem(i){
 cart.splice(i,1);
 renderCart();
}

function checkout(){
 if(!isLogin){alert("Login trước!");return}
 if(cart.length===0){alert("Chưa có sản phẩm");return}

 let total=document.getElementById("total").innerText;

 orders.push({items:[...cart],total:total});

 let box=document.createElement("div");
 box.innerHTML=`
 <div style='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:black;padding:20px;border-radius:10px;text-align:center;'>
 <h3>💳 Chuyển khoản</h3>
 <p>MB Bank</p>
 <p>${total}đ</p>
 <p>STK: ${stk}</p>
 <p>GIA HUY</p>
 <p style='color:yellow'>Nội dung: HUYVIP</p>
 <button onclick='this.parentElement.parentElement.remove()'>Đóng</button>
 </div>`;
 document.body.appendChild(box);

 cart=[];
 renderCart();
}

function adminLogin(){
 let u=prompt("Admin");
 let p=prompt("Pass");
 if(u==="admin" && p==="999"){
  viewOrders();
 }else alert("Sai");
}

function viewOrders(){
 if(orders.length===0){alert("Chưa có đơn");return}
 let text="Đơn hàng:\n";
 orders.forEach((o,i)=>{
  text += "\nĐơn "+(i+1)+": "+o.total+"đ\n";
  o.items.forEach(it=>{
   text += "- "+it.name+"\n";
  });
 });
 alert(text);
}

render();
</script>

</body>
</html>
